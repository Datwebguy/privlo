<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title description">
  <title id="title">Privlo — Private Financial Flows</title>
  <desc id="description">A dark teal banner for Privlo, confidential payroll and token distributions powered by Zama and TokenOps.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050807"/>
      <stop offset="0.54" stop-color="#090d0d"/>
      <stop offset="1" stop-color="#041313"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#6fffd7"/>
      <stop offset="1" stop-color="#4ec9ed"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#43f5cf" stop-opacity=".26"/>
      <stop offset="1" stop-color="#43f5cf" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="620" rx="30" fill="url(#background)"/>
  <circle cx="1320" cy="200" r="330" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="210" cy="570" r="280" fill="url(#glow)" opacity=".38" filter="url(#blur)"/>

  <g opacity=".32" fill="#65fbd4">
    <circle cx="125" cy="118" r="3"/>
    <circle cx="338" cy="82" r="2"/>
    <circle cx="580" cy="136" r="2.5"/>
    <circle cx="1058" cy="98" r="2"/>
    <circle cx="1450" cy="466" r="3"/>
    <circle cx="1190" cy="522" r="2"/>
    <circle cx="695" cy="536" r="2"/>
  </g>
  <g opacity=".14" stroke="#5ceaca">
    <path d="M125 118 338 82 580 136"/>
    <path d="M1058 98 1320 200 1450 466"/>
    <path d="M695 536 930 475 1190 522"/>
  </g>

  <g transform="translate(116 104)">
    <rect width="92" height="92" rx="26" fill="#0c211e" stroke="#43e9c1" stroke-opacity=".45"/>
    <path d="M55 26a25 25 0 1 0 0 40" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M36 71V41a14 14 0 1 1 14 14H36" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="238" y="172" fill="#f5f8f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="760" letter-spacing="-2">privlo</text>
  <text x="116" y="320" fill="#f5f8f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="79" font-weight="760" letter-spacing="-4">Financial flows,</text>
  <text x="116" y="407" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="79" font-weight="760" letter-spacing="-4">kept private.</text>
  <text x="120" y="474" fill="#9aa9a9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26">
    Encrypted payroll · investor distributions · airdrops · vesting
  </text>

  <g transform="translate(1178 252)" filter="url(#softGlow)">
    <path d="M106 0 208 39 194 151c-12 77-88 112-88 112S30 228 18 151L4 39Z" fill="#071b19" stroke="#5cf5d1" stroke-opacity=".65" stroke-width="3"/>
    <path d="m66 128 28 27 59-69" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M106 28v205" stroke="#5cf5d1" stroke-opacity=".12"/>
  </g>

  <g transform="translate(118 523)">
    <rect width="272" height="48" rx="24" fill="#0b1d1b" stroke="#57eac8" stroke-opacity=".28"/>
    <circle cx="27" cy="24" r="6" fill="#62f3d0"/>
    <text x="46" y="31" fill="#b9c8c6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Built on Zama Protocol</text>
    <rect x="408" width="260" height="48" rx="24" fill="#0b1d1b" stroke="#57eac8" stroke-opacity=".28"/>
    <circle cx="435" cy="24" r="6" fill="#52cae9"/>
    <text x="454" y="31" fill="#b9c8c6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Powered by TokenOps</text>
  </g>

  <rect x="1.5" y="1.5" width="1597" height="617" rx="28.5" fill="none" stroke="#64f4d1" stroke-opacity=".15" stroke-width="3"/>
</svg>
